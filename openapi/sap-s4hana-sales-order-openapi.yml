          description: Corrected quantity
          example: example_value
        DelivBlockReasonForSchedLine:
          type: string
          maxLength: 2
          description: Delivery block for the schedule line
          example: example_value
    SalesOrderText:
      type: object
      description: >-
        Sales order header text entity (A_SalesOrderText) for long texts
        associated with the sales order header.
      properties:
        SalesOrder:
          type: string
          maxLength: 10
          description: Sales order number
          example: example_value
        Language:
          type: string
          maxLength: 2
          description: Language key (ISO 639-1)
          example: example_value
        LongTextID:
          type: string
          maxLength: 4
          description: Text ID (e.g., 0001 for header note)
          example: '500123'
        LongText:
          type: string
          description: Text content
          example: example_value
    SalesOrderItemText:
      type: object
      description: >-
        Sales order item text entity (A_SalesOrderItemText) for long texts
        associated with a sales order item.
      properties:
        SalesOrder:
          type: string
          maxLength: 10
          description: Sales order number
          example: example_value
        SalesOrderItem:
          type: string
          maxLength: 6
          description: Sales order item number
          example: example_value
        Language:
          type: string
          maxLength: 2
          description: Language key (ISO 639-1)
          example: example_value
        LongTextID:
          type: string
          maxLength: 4
          description: Text ID
